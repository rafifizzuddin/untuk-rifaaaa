<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Rifaaa 🤍</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    overflow-x:hidden;
    overflow-y:auto;
}

#container{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
    color:white;
}

.card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    max-width:700px;
    width:100%;
    animation:fade .8s;
    box-shadow:0 10px 30px rgba(0,0,0,.2);

    max-height:90vh;
    overflow-y:auto;
}

h1{
    margin-bottom:15px;
    font-size:40px;
}

h2{
    margin-bottom:25px;
}

p{
    font-size:18px;
    line-height:1.7;
}

button{
    margin-top:25px;
    padding:13px 35px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:white;
    color:#ff4d88;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    margin-top:20px;
    text-align:center;
}

#message{
    margin-top:20px;
    min-height:30px;
    font-size:20px;
}

#countdown{
    font-size:90px;
    font-weight:bold;
}

video{
    display:none;
    width:90%;
    max-width:900px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.heart{
    position:fixed;
    color:white;
    animation:fall linear forwards;
    pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

/* ini buat revisi pertama */

.bukti-card{

animation:fade .8s;

}

.bukti{

width:100%;
max-width:330px;

border-radius:18px;

margin:20px auto;

display:block;

box-shadow:0 10px 35px rgba(0,0,0,.35);

animation:zoom .8s;

}

.bukti:hover{
    transform:scale(1.03);
    transition:.3s;
}

@keyframes zoom{

from{

transform:scale(.6);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}

.bukti-card h2{

margin-bottom:15px;

}

.bukti-card p{

margin-top:20px;

line-height:1.8;

font-size:18px;

}

</style>

</head>
<body>

<div id="container">

<div class="card" id="card">

<h1>🤍 Hai haii rifaaaa 🤍</h1>

<p>
apippp tahu mungkin ini cuma sebuah website sederhana...
Tapi aku harap kamu mau meluangkan beberapa menit
untuk melihat sesuatu yang sudah apippp siapkan.
</p>

<button onclick="start()">Mulai</button>

</div>

<video id="video" controls>
<source src="video.mp4" type="video/mp4">
</video>

</div>

<script>

async function masukFullscreen(){

    const el = document.documentElement;

    if(el.requestFullscreen){

        await el.requestFullscreen();

    }else if(el.webkitRequestFullscreen){

        el.webkitRequestFullscreen();

    }

}

let soal=[
{
q:"Kapan tanggal kita jadian?",
a:"10 desember 2025",
img:"images/jadian.jpg",
judul:"10 Desember 2025 🤍",
cerita:"Hari di mana semuanya dimulai. Dari sekian banyak hari yang pernah kita lewati, hari itu selalu punya tempat spesial di hati apipp."
},

{
q:"Siapa yang pertama kali bilang sayang? (aku atau kamu)",
a:"aku",
img:"images/sayang.jpg",
judul:"Masih ingat? 🤭",
cerita:"Ternyata rifaa yang duluan bilang sayang. Untung waktu itu apipp ndaa sia siain kesempatan. 😂🤍"
},

{
q:"Apa makanan favorit apipp?",
a:"mie ayam",
img:"images/mieayam.jpg",
judul:"Mie Ayam 🍜",
cerita:"Entah kenapa setiap makan mie ayam apipp selalu keinget kamu."
},

{
q:"Siapa yang paling sering ngambek? (aku atau kamu)",
a:"aku",
img:"images/ngambek.png",
judul:"Hehe 😆",
cerita:"Walaupun sering ngambek, rifaaa tetap lucu kok, apalagi kalau lagi cemburu."
},

{
q:"Siapa yang biasanya minta maaf duluan? (aku atau kamu)",
a:"kamu",
img:"images/maaf.jpg",
judul:"Gapapa 🤍",
cerita:"Karena bagiku mempertahankan kamu jauh lebih penting daripada mempertahankan ego."
}
];

let index=0;

function ketik(teks, elementId, kecepatan = 40){

    let i = 0;
    const elemen = document.getElementById(elementId);

    elemen.textContent = "";

    const timer = setInterval(()=>{

        elemen.textContent += teks[i];

        i++;

        if(i >= teks.length){

            clearInterval(timer);

        }

    },kecepatan);

}

async function start(){

    await masukFullscreen();

    buatHati();

    tampilSoal();

}

function tampilSoal(){

document.getElementById("card").innerHTML=`

<h2 id="pertanyaan"></h2>

<input id="jawaban" placeholder="Tulis jawaban di sini">

<div id="message"></div>

<button onclick="cek()">Jawab</button>

`;

ketik(soal[index].q,"pertanyaan",35);

}

// ini revisi pertama //

function tampilBukti(){

document.getElementById("card").innerHTML=`

<div class="bukti-card">

<h2>${soal[index].judul}</h2>

<img src="${soal[index].img}" class="bukti">

<p id="cerita"></p>

<button onclick="lanjut()">Lanjut ➜</button>

</div>

`;

ketik(soal[index].cerita,"cerita",35);

}

// selesai revisi pertama //

function cek(){

let input=document.getElementById("jawaban").value.toLowerCase().trim();

let pesan=document.getElementById("message");

if(input==soal[index].a){

    pesan.innerHTML="🥹 Benar... ternyata kamu masih ingat.";

    setTimeout(()=>{

        tampilBukti();

    },1200);

}else{

    pesan.innerHTML="😂 Hehe... kayaknya salah deh. Tapi gapapa, tetap lihat kenangannya ya 🤍";

    setTimeout(()=>{

        tampilBukti();

    },1800);

}

}

function countdown(){

let angka=3;

document.getElementById("card").innerHTML=`
<h1 id="countdown">3</h1>
<p>Sebentar lagi...</p>
`;

let timer=setInterval(()=>{

angka--;

if(angka>0){

document.getElementById("countdown").innerHTML=angka;

}else{

clearInterval(timer);

playVideo();

}

},1000);

}

function playVideo(){

document.getElementById("card").style.display="none";

let video=document.getElementById("video");

video.style.display="block";

video.play();

video.onended=function(){

document.getElementById("video").style.display="none";

document.getElementById("card").style.display="block";

document.getElementById("card").innerHTML=`

<h1>🤍 Terima Kasih</h1>

<p style="margin-top:20px">

Terima kasih sudah menjadi bagian dari perjalanan hidupku.

Entah bagaimana akhirnya nanti...

Aku cuma ingin bilang kalau setiap momen di video tadi akan selalu menjadi kenangan yang indah.

Semoga rifaa selalu bahagia.

🤍

</p>

`;

};

}

function buatHati(){

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.top="-30px";

h.style.fontSize=(15+Math.random()*25)+"px";

h.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},8000);

},250);

}

// fungsi untuk revisi pertama //
function lanjut(){

index++;

if(index >= soal.length){

countdown();

}else{

tampilSoal();

}

}

</script>

</body>
</html>
